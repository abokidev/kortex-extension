<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #050810; color: #e8edf2;
    width: 280px; padding: 16px;
  }
  .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .logo-mark {
    width: 24px; height: 24px; background: rgba(0,196,255,0.15);
    border: 1px solid rgba(0,196,255,0.3); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #00C4FF;
  }
  .logo-text { font-size: 14px; font-weight: 700; }
  .status { font-size: 11px; color: #7a909e; margin-bottom: 12px; line-height: 1.5; }
  .status span { color: #00C4FF; font-weight: 600; }
  .btn {
    width: 100%; padding: 9px; border-radius: 8px; border: none;
    font-size: 11px; font-weight: 600; cursor: pointer; margin-bottom: 6px;
  }
  .btn-primary { background: #00C4FF; color: #050810; }
  .btn-secondary { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #e8edf2; }
  .btn-secondary:hover { background: rgba(255,255,255,0.08); }
  .btn-sync { background: rgba(0,196,255,0.08); border: 1px solid rgba(0,196,255,0.2); color: #00C4FF; }
  input {
    width: 100%; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
    padding: 8px 10px; color: #e8edf2; font-size: 11px; margin-bottom: 6px;
  }
  input:focus { outline: none; border-color: rgba(0,196,255,0.4); }
  .error { color: #FF4D4D; font-size: 10px; margin-bottom: 6px; display: none; }
  .shortcut { font-size: 10px; color: #4a5568; text-align: center; margin-top: 8px; }
  a.link { color: #00C4FF; font-size: 10px; display: block; text-align: center; margin-top: 8px; text-decoration: none; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="header">
  <div class="logo-mark">K</div>
  <span class="logo-text">Kortex</span>
</div>

<!-- Login form -->
<div id="loginSection">
  <p style="font-size:11px;color:#7a909e;margin-bottom:10px;">Sign in to your Kodingo account</p>
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <div class="error" id="loginError"></div>
  <button class="btn btn-primary" id="loginBtn">Sign in</button>
  <a class="link" href="https://kodingo.xyz/signup" target="_blank">Create account →</a>
</div>

<!-- Signed in section -->
<div id="signedInSection" class="hidden">
  <div class="status" id="status"></div>
  <button class="btn btn-primary" id="openBtn">Open Kortex sidebar</button>
  <button class="btn btn-sync hidden" id="syncBtn">↺ Sync projects</button>
  <button class="btn btn-secondary" id="settingsBtn">Manage projects</button>
  <div class="shortcut">Keyboard shortcut: Cmd+Shift+K</div>
  <a class="link" href="https://kodingo.xyz/dashboard" target="_blank">Open dashboard →</a>
  <button class="btn btn-secondary" id="logoutBtn" style="margin-top:6px;font-size:10px;color:#FF4D4D;border-color:rgba(255,77,77,0.2);">Sign out</button>
</div>

<script src="popup.js"></script>
</body>
</html>
